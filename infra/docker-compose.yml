# RabbitRide — infraestrutura local
# Subir:   ./scripts/up.sh
# Parar:   ./scripts/down.sh
#
# Variáveis lidas de .env (na raiz do projeto). Defaults garantem que
# funciona mesmo sem .env presente.

name: rabbitride

services:
  postgres:
    image: postgres:16-alpine
    container_name: rabbitride-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rabbitride}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rabbitride}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rabbitride}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [rabbitride-net]

  redis:
    image: redis:7-alpine
    container_name: rabbitride-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [rabbitride-net]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitride-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbitride}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitride}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_UI_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [rabbitride-net]

  mailhog:
    image: mailhog/mailhog:latest
    container_name: rabbitride-mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    # MailHog usa scratch — sem healthcheck. Considere axllent/mailpit em produção.
    networks: [rabbitride-net]

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  rabbitride-net:
    driver: bridge
