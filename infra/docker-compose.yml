# RabbitRide — infraestrutura local
# Subir:   docker compose -f infra/docker-compose.yml up -d
# Parar:   docker compose -f infra/docker-compose.yml down
# Limpar:  docker compose -f infra/docker-compose.yml down -v   (apaga volumes!)

name: rabbitride

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — bancos transacionais (1 database por serviço)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: rabbitride-postgres
    environment:
      POSTGRES_USER: rabbitride
      POSTGRES_PASSWORD: rabbitride
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rabbitride"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [rabbitride-net]

  # ---------------------------------------------------------------------------
  # Redis — cache do catálogo de carros
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rabbitride-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [rabbitride-net]

  # ---------------------------------------------------------------------------
  # RabbitMQ — broker de mensagens (com management UI em :15672)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitride-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rabbitride
      RABBITMQ_DEFAULT_PASS: rabbitride
    ports:
      - "5672:5672"    # protocolo AMQP (publishers/consumers)
      - "15672:15672"  # web UI (http://localhost:15672 — login rabbitride/rabbitride)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [rabbitride-net]

  # ---------------------------------------------------------------------------
  # MailHog — SMTP fake para capturar e-mails em dev (UI em :8025)
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: rabbitride-mailhog
    ports:
      - "1025:1025"   # SMTP (notification-service aponta pra cá)
      - "8025:8025"   # web UI (http://localhost:8025)
    # MailHog usa imagem 'scratch' — sem shell, healthcheck inviável.
    # Em produção sério, considere axllent/mailpit (fork moderno com healthcheck).
    networks: [rabbitride-net]

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  rabbitride-net:
    driver: bridge
