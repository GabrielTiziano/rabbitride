spring:
  application:
    name: rental-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/rental_db
    username: ${POSTGRES_USER:rabbitride}
    password: ${POSTGRES_PASSWORD:rabbitride}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_AMQP_PORT:5672}
    username: ${RABBITMQ_USER:rabbitride}
    password: ${RABBITMQ_PASSWORD:rabbitride}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 3
          max-interval: 10000ms
        default-requeue-rejected: false

  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 3000
            logger-level: BASIC

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.gghiaroni.rabbitride: DEBUG
    org.springframework.web: INFO

app:
  jwt:
    secret: ${JWT_SECRET:troque-isso-em-producao-use-um-secret-aleatorio-de-pelo-menos-256-bits-asdf1234}

car-service:
  url: ${CAR_SERVICE_URL:http://localhost:8082}
  internal-token: ${INTERNAL_API_TOKEN:dev-internal-token-troque-em-prod}
